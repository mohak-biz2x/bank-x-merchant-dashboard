<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Bank X Merchant Dashboard</title>
    <script>
      // GitHub Pages SPA redirect - converts path to query param for index.html
      var repo = '/bank-x-merchant-dashboard';
      var path = window.location.pathname.slice(repo.length);
      var search = window.location.search;
      var hash = window.location.hash;
      var redirect = repo + '/?p=' + encodeURIComponent(path + search + hash);
      window.location.replace(redirect);
    </script>
  </head>
  <body></body>
</html>
